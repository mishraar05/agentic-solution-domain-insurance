rules:
- Raw document bodies are prohibited unless a separate authorization explicitly permits minimized use.
- A source term never proves coverage inclusion, eligibility, or benefit entitlement by itself.
- Unsupported or ambiguous terminology remains unresolved.
- Model confidence is not accepted; deterministic evidence components govern routing.
