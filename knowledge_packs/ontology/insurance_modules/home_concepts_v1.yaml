domain: Home
description: Home product concepts for homeowners, renters and condo, and dwelling-fire risks.
concepts:
- concept_id: Home.ResidentialRisk
  name: Residential Risk
  domain: Home
  definition: A residential property interest evaluated or covered under a home insurance product.
  synonyms: [home risk, residential property]
  physical_name_variants: [residential_risk, home_risk, property_risk]
  relationships:
  - type: is_a
    target: Policy.InsuredObject
  - type: references
    target: Shared.Location
  lifecycle_state: Specialized
  concept_type: ENTITY
  lob_applicability: [HOMEOWNERS, RENTERS_CONDO, DWELLING_FIRE]
  privacy_sensitivity: INDIRECT
  temporality: SCD2
- concept_id: Home.Building
  name: Residential Building
  domain: Home
  definition: The residential structure and governed building components associated with a home risk.
  synonyms: [dwelling building, residential structure]
  physical_name_variants: [home_building, dwelling_building, structure_id]
  relationships:
  - type: belongs_to
    target: Home.ResidentialRisk
  lifecycle_state: Specialized
  concept_type: ENTITY
  lob_applicability: [HOMEOWNERS, DWELLING_FIRE]
