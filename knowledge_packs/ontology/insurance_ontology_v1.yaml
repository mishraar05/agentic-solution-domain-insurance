- domain: Motor
  path: insurance_modules/motor_concepts_v1.yaml
- domain: Home
  path: insurance_modules/home_concepts_v1.yaml
- domain: CommercialProperty
  path: insurance_modules/commercial_property_concepts_v1.yaml
- domain: Pensions
  path: insurance_modules/pensions_concepts_v1.yaml
