resources:
  jobs:
    source_intelligence_pipeline:
      name: "Source Intelligence v1 Pipeline"
      tasks:
        - task_key: config
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/00_config.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              naming_convention: ${var.naming_convention}
              rule_effective_date: ${var.rule_effective_date}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
        - task_key: validate_source
          depends_on:
            - task_key: config
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/01_validate_source_scope.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              naming_convention: ${var.naming_convention}
              rule_effective_date: ${var.rule_effective_date}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
        - task_key: build_dictionary
          depends_on:
            - task_key: validate_source
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/02_build_source_dictionary.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              naming_convention: ${var.naming_convention}
              rule_effective_date: ${var.rule_effective_date}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
        - task_key: generate_documentation
          depends_on:
            - task_key: build_dictionary
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/03_generate_source_documentation.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              naming_convention: ${var.naming_convention}
              rule_effective_date: ${var.rule_effective_date}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
        - task_key: create_queue
          depends_on:
            - task_key: generate_documentation
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/04_create_review_queue.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              naming_convention: ${var.naming_convention}
              rule_effective_date: ${var.rule_effective_date}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
        - task_key: validate
          depends_on:
            - task_key: create_queue
          notebook_task:
            notebook_path: ../src/workflows/source_intelligence/05_validate_source_intelligence.py
            source: WORKSPACE
            base_parameters:
              run_id: "si_job_{{job.run_id}}"
              engagement_id: ${var.engagement_id}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              source_system: ${var.source_system}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
              documentation_model_endpoint: ${var.documentation_model_endpoint}
