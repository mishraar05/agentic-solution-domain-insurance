  INDIRECT, because it is a grouping concept with no single governed
  attribute of its own; it is represented only by an opaque
  synthetic_reference token. Shared.Location is populated at region
  granularity only, never a full address. No real organization, address, or
  valuation evidence is included anywhere in this example.
